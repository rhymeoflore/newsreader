<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malayalam News Aggregator</title>
    <meta name="description" content="Latest news from Deshabhimani - Kerala, National, International, Sports & more">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://www.deshabhimani.com/logo-symbol.svg" type="image/svg+xml">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="brand">
                    <h1 class="brand-title">Malayalam News Aggregator</h1>
                </div>
                <div class="header-actions">
                    <span class="last-updated" id="lastUpdated"></span>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </div>
            <nav class="category-nav" id="categoryNav">
                <button class="cat-btn active" data-category="all">All News</button>
            </nav>
        </div>
    </header>

    <main class="main container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading news...</p>
        </div>

        <div class="error-msg" id="errorMsg" style="display:none;">
            <p>⚠️ Could not load news. Please try again later.</p>
        </div>

        <section class="news-grid" id="newsGrid"></section>
    </main>

    <!-- Article Reader Modal -->
    <div class="modal-overlay" id="articleModal">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" id="modalClose" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>
                News sourced from <a href="https://www.deshabhimani.com" target="_blank" rel="noopener">deshabhimani.com</a>
                · Updated automatically every hour
                · <a href="https://github.com" target="_blank" rel="noopener">View on GitHub</a>
            </p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
